{% extends "base.html" %}

{% block title %}管理者登入 - 活動報名系統{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-lg-5 col-md-7 col-sm-9">
            <div class="glass-card">
                <div class="text-center mb-5">
                    <div class="d-inline-flex align-items-center justify-content-center bg-primary bg-opacity-10 border border-primary border-opacity-25 rounded-circle p-3 mb-3 text-primary" style="width: 70px; height: 70px;">
                        <i class="bi bi-shield-lock-fill" style="font-size: 2rem;"></i>
                    </div>
                    <h2 class="fw-bold text-white mb-2">管理者登入</h2>
                    <p class="text-secondary">請輸入您的帳號密碼以登入管理主頁</p>
                </div>

                <form action="{{ url_for('admin.do_login') }}" method="POST" class="needs-validation" novalidate>
                    
                    <!-- 帳號 -->
                    <div class="mb-4">
                        <label for="username" class="form-label">管理者帳號</label>
                        <div class="input-group">
                            <span class="input-group-text bg-dark border-secondary text-secondary">
                                <i class="bi bi-person-badge-fill"></i>
                            </span>
                            <input type="text" class="form-control" id="username" name="username" placeholder="請輸入帳號" value="{{ username }}" required autofocus>
                        </div>
                    </div>

                    <!-- 密碼 -->
                    <div class="mb-5">
                        <label for="password" class="form-label">安全密碼</label>
                        <div class="input-group">
                            <span class="input-group-text bg-dark border-secondary text-secondary">
                                <i class="bi bi-key-fill"></i>
                            </span>
                            <input type="password" class="form-control" id="password" name="password" placeholder="請輸入密碼" required>
                        </div>
                    </div>

                    <!-- 登入按鈕 -->
                    <div class="d-grid mb-3">
                        <button type="submit" class="btn btn-premium btn-lg">
                            <i class="bi bi-box-arrow-in-right me-2"></i>安全登入
                        </button>
                    </div>

                    <div class="text-center">
                        <a href="{{ url_for('public.index') }}" class="text-decoration-none text-secondary" style="font-size: 0.9rem;">
                            <i class="bi bi-arrow-left me-1"></i>返回活動報名頁
                        </a>
                    </div>

                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
